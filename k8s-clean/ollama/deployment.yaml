apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: ollama-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      initContainers:
        # Pulls tinyllama on first boot; skips if model already exists in PVC
        - name: pull-tinyllama
          image: ollama/ollama:latest
          command:
            - sh
            - -c
            - |
              ollama serve &
              OLLAMA_PID=$!
              echo "Waiting for Ollama to start..."
              sleep 5
              echo "Pulling tinyllama..."
              ollama pull tinyllama
              echo "Done! Stopping temp server..."
              kill $OLLAMA_PID
          env:
            - name: OLLAMA_HOST
              valueFrom:
                configMapKeyRef:
                  name: ollama-config
                  key: OLLAMA_HOST
            - name: OLLAMA_MODELS
              valueFrom:
                configMapKeyRef:
                  name: ollama-config
                  key: OLLAMA_MODELS
          volumeMounts:
            - name: ollama-data
              mountPath: /root/.ollama
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "4Gi"
              cpu: "2000m"
      containers:
        - name: ollama
          image: ollama/ollama:latest
          ports:
            - containerPort: 11434
          envFrom:
            - configMapRef:
                name: ollama-config
          volumeMounts:
            - name: ollama-data
              mountPath: /root/.ollama
          livenessProbe:
            httpGet:
              path: /api/version
              port: 11434
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/version
              port: 11434
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "4Gi"
              cpu: "2000m"
      volumes:
        - name: ollama-data
          persistentVolumeClaim:
            claimName: ollama-pvc
