apiVersion: v1
kind: Service
metadata:
  name: ollama-nodeport
  namespace: ollama-agent
  labels:
    app: ollama
    access-type: external-debug
spec:
  type: NodePort
  selector:
    app: ollama
  ports:
    - name: ollama-api
      port: 11434
      targetPort: 11434
      nodePort: 30434
      protocol: TCP
