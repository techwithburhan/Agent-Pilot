apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: ollama-agent
  labels:
    app: ollama
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      initContainers:
        - name: pull-tinyllama
          image: ollama/ollama:latest
          command:
            - sh
            - -c
            - |
              if [ -d "/root/.ollama/models/manifests/registry.ollama.ai/library/tinyllama" ]; then
                echo "tinyllama already exists - skipping download"
                exit 0
              fi

              ollama serve &
              OLLAMA_PID=$!

              for i in $(seq 1 30); do
                if curl -s http://localhost:11434/api/tags > /dev/null 2>&1; then
                  echo "Server ready!"
                  break
                fi
                echo "Waiting... ($i/30)"
                sleep 2
              done

              ollama pull tinyllama

              ollama list

              kill $OLLAMA_PID 2>/dev/null || true
              wait $OLLAMA_PID 2>/dev/null || true
              echo "Init complete!"
          volumeMounts:
            - name: ollama-models-storage
              mountPath: /root/.ollama
          env:
            - name: OLLAMA_HOST
              value: "0.0.0.0"
            - name: OLLAMA_MODELS
              value: "/root/.ollama/models"
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "2Gi"

      containers:
        - name: ollama
          image: ollama/ollama:latest
          imagePullPolicy: IfNotPresent
          command: ["ollama", "serve"]
          ports:
            - containerPort: 11434
              name: ollama-api
              protocol: TCP
          envFrom:
            - configMapRef:
                name: ollama-config
          env:
            - name: OLLAMA_HOST
              value: "0.0.0.0"
          volumeMounts:
            - name: ollama-models-storage
              mountPath: /root/.ollama
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "3Gi"
          livenessProbe:
            httpGet:
              path: /api/tags
              port: 11434
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 15
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /api/tags
              port: 11434
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 3

      volumes:
        - name: ollama-models-storage
          persistentVolumeClaim:
            claimName: ollama-models-pvc

      terminationGracePeriodSeconds: 60
