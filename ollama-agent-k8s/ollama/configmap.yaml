apiVersion: v1
kind: ConfigMap
metadata:
  name: ollama-config
  namespace: ollama-agent
  labels:
    app: ollama
data:
  OLLAMA_HOST: "0.0.0.0"
  OLLAMA_PORT: "11434"
  OLLAMA_MODELS: "/root/.ollama/models"
  OLLAMA_KEEP_ALIVE: "24h"
  OLLAMA_NUM_PARALLEL: "2"
  OLLAMA_MAX_LOADED_MODELS: "1"
  DEFAULT_MODEL: "tinyllama"
  AVAILABLE_MODELS: "tinyllama"
