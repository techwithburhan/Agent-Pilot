apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ollama-mongodb
  namespace: ollama-agent
  labels:
    app: ollama-mongodb
spec:
  serviceName: ollama-mongodb-headless
  replicas: 1
  selector:
    matchLabels:
      app: ollama-mongodb
  template:
    metadata:
      labels:
        app: ollama-mongodb
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: mongodb
          image: mongo:6.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 27017
          args:
            - "--auth"
            - "--bind_ip_all"
          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: ollama-backend-secret
                  key: MONGO_USERNAME
            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ollama-backend-secret
                  key: MONGO_PASSWORD
            - name: MONGO_INITDB_DATABASE
              value: "ollama-agent"
          volumeMounts:
            - name: mongodb-data
              mountPath: /data/db
            - name: mongodb-init
              mountPath: /docker-entrypoint-initdb.d/
          livenessProbe:
            exec:
              command:
                - mongosh
                - --eval
                - "db.adminCommand('ping')"
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 5
            timeoutSeconds: 10
          readinessProbe:
            exec:
              command:
                - mongosh
                - --eval
                - "db.adminCommand('ping')"
            initialDelaySeconds: 20
            periodSeconds: 15
            failureThreshold: 3
            timeoutSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      volumes:
        - name: mongodb-init
          configMap:
            name: ollama-mongodb-init
  volumeClaimTemplates:
    - metadata:
        name: mongodb-data
        labels:
          app: ollama-mongodb
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: standard
        resources:
          requests:
            storage: 1Gi
