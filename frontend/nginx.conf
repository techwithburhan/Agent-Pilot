# ============================================================
# NGINX CONFIGURATION FILE
# React Router ke liye custom config
# ============================================================

server {

    # Port 80 pe listen karo (HTTP)
    listen 80;

    # Koi bhi domain ya IP se request aaye accept karo
    server_name _;

    # React build files yahan hain
    root /usr/share/nginx/html;

    # Default file jo serve hogi
    index index.html;

    # ---- React Router Fix ----
    # Yeh sabse important part hai!
    # React Router ke saath /login ya /chat pe directly jaoge
    # toh Nginx sochega yeh ek alag file hai - 404 dega
    # try_files bolta hai: pehle actual file dhundo,
    # nahi mila toh index.html do - React Router handle karega
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---- Static Files Caching ----
    # JS, CSS, images ko 1 saal ke liye cache karo browser mein
    # Kyunki React build mein filename mein hash hota hai
    # Example: main.a3f8c2.js - yeh tab hi badlega jab code badle
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        # CORS headers - agar CDN use karo toh kaam aayega
        add_header Access-Control-Allow-Origin "*";
    }

    # ---- index.html ko kabhi cache mat karo ----
    # Kyunki naye deployment mein nayi JS/CSS files hongi
    # Agar index.html cache ho gayi toh naye files load nahi honge
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # ---- Gzip Compression ----
    # Files compress karke bhejo - bandwidth bachao, speed badhao
    # 1MB JS file compress hoke ~200KB ho jaati hai
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    # ---- Security Headers ----
    # Basic security headers add karo
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";

    # ---- Error Pages ----
    # Koi bhi error aaye toh React app handle karegi
    error_page 404 /index.html;
    error_page 500 502 503 504 /index.html;
}
