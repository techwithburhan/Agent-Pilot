# ============================================================
# DEPLOYMENT - Ollama AI Engine
# LOCAL KIND CLUSTER VERSION - Fixed
# Changes:
#   1. ConfigMap se env variables lo
#   2. Init container timeout badha diya (3.8GB download)
#   3. Resources kam kiye local machine ke liye
#   4. llama2 model explicitly set
# Command: kubectl apply -f ollama/deployment.yaml
# ============================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: ollama-agent
  labels:
    app: ollama
    component: ai-engine
    environment: production

spec:
  replicas: 1
  strategy:
    type: Recreate               # RAM heavy app - Recreate safe hai

  selector:
    matchLabels:
      app: ollama

  template:
    metadata:
      labels:
        app: ollama
        component: ai-engine

    spec:
      # ── Init Container - Model Download ──────────────────
      # Main container se PEHLE chalta hai
      # llama2 model download karke volume mein save karta hai
      # Dobara restart pe download nahi hoga - volume mein saved hai
      initContainers:
        - name: pull-llama2
          image: ollama/ollama:latest
          command:
            - sh
            - -c
            - |
              # Pehle check karo model already hai ya nahi
              if [ -d "/root/.ollama/models/manifests/registry.ollama.ai/library/llama2" ]; then
                echo "✅ llama2 already exists - skipping download"
                exit 0
              fi

              echo "🚀 Ollama server start kar raha hoon..."
              ollama serve &
              OLLAMA_PID=$!

              # Server ready hone ka wait karo
              echo "⏳ Server ready hone ka wait..."
              for i in $(seq 1 30); do
                if curl -s http://localhost:11434/api/tags > /dev/null 2>&1; then
                  echo "✅ Server ready!"
                  break
                fi
                echo "  Waiting... ($i/30)"
                sleep 2
              done

              # llama2 pull karo with output
              echo "📦 llama2 download shuru ho raha hai (~3.8GB)..."
              echo "⚠️  Internet speed ke hisaab se 5-20 min lag sakte hain"
              ollama pull llama2

              echo "✅ llama2 ready!"
              ollama list

              # Server band karo
              kill $OLLAMA_PID 2>/dev/null || true
              wait $OLLAMA_PID 2>/dev/null || true
              echo "✅ Init complete!"

          volumeMounts:
            - name: ollama-models-storage
              mountPath: /root/.ollama  # Models yahan save hongi PVC mein

          # ── Init Container Resources ──────────────────────
          resources:
            requests:
              cpu: "500m"
              memory: "2Gi"      # Download ke liye 2GB kaafi
            limits:
              cpu: "2000m"
              memory: "4Gi"

          # ── Init Container Env ────────────────────────────
          env:
            - name: OLLAMA_HOST
              value: "0.0.0.0"
            - name: OLLAMA_MODELS
              value: "/root/.ollama/models"

      # ── Main Container - Ollama Server ───────────────────
      containers:
        - name: ollama
          image: ollama/ollama:latest
          imagePullPolicy: IfNotPresent

          command: ["ollama", "serve"]

          ports:
            - containerPort: 11434
              name: ollama-api
              protocol: TCP

          # ── Environment Variables from ConfigMap ──────────
          # ConfigMap ke saare variables yahan inject honge
          envFrom:
            - configMapRef:
                name: ollama-config    # ollama/configmap.yaml

          # Extra variables jo ConfigMap mein nahi hain
          env:
            - name: OLLAMA_HOST
              value: "0.0.0.0"        # 0.0.0.0 = cluster wide accessible
              # Yeh sabse important line hai
              # localhost hota toh sirf container access kar sakta

          # ── Volume Mount ─────────────────────────────────
          volumeMounts:
            - name: ollama-models-storage
              mountPath: /root/.ollama  # Init container ne yahan save kiya tha

          # ── Resources - Local Machine Ke Liye ────────────
          resources:
            requests:
              cpu: "500m"        # Local ke liye 0.5 CPU kaafi
              memory: "3Gi"      # llama2 ~3.8GB - 3Gi minimum
            limits:
              cpu: "2000m"       # Max 2 CPU cores
              memory: "6Gi"      # Max 6GB RAM

          # ── Health Checks ─────────────────────────────────
          livenessProbe:
            httpGet:
              path: /api/tags
              port: 11434
            initialDelaySeconds: 120   # Model load hone ka time - 2 min wait
            periodSeconds: 30
            timeoutSeconds: 15
            failureThreshold: 5        # 5 baar fail → restart

          readinessProbe:
            httpGet:
              path: /api/tags
              port: 11434
            initialDelaySeconds: 60    # 1 min baad pehla check
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 3        # 3 fail → traffic mat bhejo

      # ── Volumes ──────────────────────────────────────────
      volumes:
        - name: ollama-models-storage
          persistentVolumeClaim:
            claimName: ollama-models-pvc   # pvc.yaml se match

      terminationGracePeriodSeconds: 60