apiVersion: v1          # Kubernetes version
kind: Service           # We are creating a Service

metadata:
  name: ollama-mongodb-headless   # This is a "headless" service for MongoDB
                                  # The backend uses this name to connect to MongoDB:
                                  # mongodb://user:pass@ollama-mongodb-headless:27017/...
  namespace: ollama-agent
  labels:
    app: ollama-mongodb

spec:
  clusterIP: None                 # clusterIP: None = this makes it a "headless" service
                                  # Normal service → gives one virtual IP for all pods
                                  # Headless service → gives a direct DNS name per pod
                                  # MongoDB needs this so each pod has a stable name
                                  # Pod name: ollama-mongodb-0.ollama-mongodb-headless

  selector:
    app: ollama-mongodb           # Send traffic to MongoDB pods with this label

  ports:
    - name: mongodb
      protocol: TCP
      port: 27017                 # Standard MongoDB port
      targetPort: 27017

  publishNotReadyAddresses: true  # Register in DNS even before pod is fully ready
                                  # Needed so MongoDB can find itself during startup