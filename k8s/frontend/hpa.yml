apiVersion: autoscaling/v2      # Kubernetes version for autoscaling
kind: HorizontalPodAutoscaler   # We are creating an HPA
                                # HPA = auto-scaling for pods
                                # When traffic is high → add more pods
                                # When traffic is low → remove pods (save cost)

metadata:
  name: ollama-frontend-hpa     # Name of this autoscaler
  namespace: ollama-agent

spec:
  # Which deployment to scale
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ollama-frontend       # Must match the name in deployment.yaml

  minReplicas: 2                # Never go below 2 pods (always keep app running)
  maxReplicas: 8                # Never go above 8 pods (control cost)

  # When to scale up or down — based on CPU usage
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70  # If CPU usage goes above 70% → add more pods
                                  # If CPU drops back down → remove pods

    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80  # If memory usage goes above 80% → add more pods

  # How fast to scale up and down
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30    # Wait 30s before scaling up again
                                        # Prevents adding too many pods at once
      policies:
        - type: Pods
          value: 2                      # Add max 2 pods at a time
          periodSeconds: 60

    scaleDown:
      stabilizationWindowSeconds: 300   # Wait 5 minutes before removing pods
                                        # Prevents removing pods during short traffic dips
      policies:
        - type: Pods
          value: 1                      # Remove max 1 pod at a time (gentle scale down)
          periodSeconds: 120