apiVersion: v1          # Kubernetes version
kind: Secret            # We are creating a Secret
                        # Secret = same as ConfigMap but for sensitive data
                        # Values are stored as base64 encoded strings
                        # (base64 is NOT encryption — it just hides values from plain text)

metadata:
  name: ollama-backend-secret     # Name of this Secret
  namespace: ollama-agent         # Our namespace
  labels:
    app: ollama-backend

type: Opaque                      # Opaque = general purpose secret (key-value pairs)

# HOW TO ENCODE YOUR VALUES:
# Run this in your terminal to convert a value to base64:
#   echo -n "your-value-here" | base64
#
# Example:
#   echo -n "mypassword123" | base64
#   → bXlwYXNzd29yZDEyMw==
#
# Then paste the result as the value below
# ─────────────────────────────────────────────────────────────────────────────

data:
  # JWT Secret — used to sign login tokens
  # Generate a strong one: node -e "console.log(require('crypto').randomBytes(64).toString('hex'))"
  # Then encode it: echo -n "your-generated-hex" | base64
  JWT_SECRET: cmVwbGFjZV93aXRoX3lvdXJfand0X3NlY3JldF9rZXlfaGVyZQ==
  #            ↑ This is base64 of "replace_with_your_jwt_secret_key_here"
  #              ← REPLACE THIS with your own encoded value

  # MongoDB username
  # Default encoded value: base64("admin")
  MONGO_USERNAME: YWRtaW4=
  #                ↑ base64 of "admin" ← REPLACE if you use a different username

  # MongoDB password
  # Default encoded value: base64("changeme123")
  # ← REPLACE THIS with a strong password
  MONGO_PASSWORD: Y2hhbmdlbWUxMjM=
  #                ↑ base64 of "changeme123"

  # Full MongoDB connection string
  # Format: mongodb://username:password@service-name:27017/database?authSource=admin
  # Encoded value of: mongodb://admin:changeme123@ollama-mongodb-headless:27017/ollama-agent?authSource=admin
  # ← REPLACE the username and password part to match MONGO_USERNAME and MONGO_PASSWORD above
  MONGO_URI: bW9uZ29kYjovL2FkbWluOmNoYW5nZW1lMTIzQG9sbGFtYS1tb25nb2RiLWhlYWRsZXNzOjI3MDE3L29sbGFtYS1hZ2VudD9hdXRoU291cmNlPWFkbWlu